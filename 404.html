<!doctype html>
<html lang="en">
  <head>
    <title>shadow-claw - redirect service</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="shadow-claw - redirect service" />
    <meta name="robots" content="noindex" />
    <script>
      (function () {
        const l = window.location;
        const isLocalhost =
          l.hostname === "localhost" ||
          l.hostname === "127.0.0.1" ||
          l.hostname === "0.0.0.0";

        if (isLocalhost) return;

        // store the full path + query + hash
        sessionStorage.setItem(
          "shadow-claw-github-pages-404-redirect",
          l.pathname + l.search + l.hash,
        );

        // redirect to entry point
        l.replace("/shadow-claw/");
      })();
    </script>
  </head>
  <body></body>
</html>
