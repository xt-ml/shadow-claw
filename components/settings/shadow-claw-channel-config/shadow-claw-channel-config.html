<template><div class="settings-section"> <h3>💬 Messaging Channels</h3> <div class="form-group"> <label class="checkbox-row"> <input data-setting="telegram-enabled-toggle" type="checkbox"> Enable Telegram channel </label> <div class="form-status" data-info="telegram-channel-status"> Telegram channel is enabled. </div> <label class="form-label">Telegram Bot Token</label> <input class="form-input" data-setting="telegram-token-input" placeholder="123456:ABC-DEF..." type="password"> <div class="form-status" data-info="telegram-token-status"> No Telegram token saved. </div> <div class="form-helper"> Create a bot with @BotFather. Send /chatid to your bot, then add the returned chat IDs below so ShadowClaw will accept messages from them. </div> </div> <div class="form-group"> <label class="form-label">Telegram Allowed Chat IDs</label> <input class="form-input" data-setting="telegram-chat-ids-input" placeholder="-1001234567890, 123456789" type="text"> <div class="form-helper"> Comma-separated Telegram chat IDs. Messages from other chats are ignored except for /chatid and /ping helper commands. </div> <div class="form-status" data-info="telegram-chat-ids-status"> No Telegram chat IDs saved. </div> <label class="checkbox-row"> <input data-setting="telegram-use-proxy-toggle" type="checkbox"> Proxy Telegram API calls through this server (/telegram/**) </label> <div class="form-helper"> Enable this when you want Telegram requests to stay same-origin and go through the local server route. Disable it to call the Telegram Bot API directly from the browser. </div> <div class="form-status" data-info="telegram-proxy-status"> Telegram API calls go directly to Telegram. </div> <button class="save-btn save-btn--inline" data-action="save-telegram-config"> 💾 Save Telegram Settings </button> <button class="save-btn save-btn--inline save-btn--secondary" data-action="verify-telegram-config"> 🔎 Verify Telegram Setup </button> </div> <div class="form-group"> <label class="checkbox-row"> <input data-setting="imessage-enabled-toggle" type="checkbox"> Enable iMessage channel </label> <div class="form-status" data-info="imessage-channel-status"> iMessage channel is enabled. </div> <label class="form-label">iMessage Bridge URL</label> <input class="form-input" data-setting="imessage-server-url-input" placeholder="https://your-bridge.example.com" type="url"> <div class="form-helper"> Required. The bridge must allow browser CORS requests and expose GET /messages, POST /messages/send, and POST /messages/typing. </div> </div> <div class="form-group"> <label class="form-label">iMessage Bridge API Key</label> <input class="form-input" data-setting="imessage-api-key-input" placeholder="Bridge API key" type="password"> <div class="form-helper"> Optional unless your bridge requires authentication. ShadowClaw sends both Authorization: Bearer and X-API-Key headers when this is set. </div> </div> <div class="form-group"> <label class="form-label">iMessage Allowed Chat IDs</label> <input class="form-input" data-setting="imessage-chat-ids-input" placeholder="chat-guid-1, +15551234567" type="text"> <div class="form-helper"> Optional. Leave blank to accept all bridge conversations. iMessage chats auto-trigger the agent without requiring an @mention. </div> <button class="save-btn save-btn--inline" data-action="save-imessage-config"> 💾 Save iMessage Settings </button> <div class="form-status" data-info="imessage-chat-ids-status"> No iMessage chat IDs saved. </div> </div> </div></template>
