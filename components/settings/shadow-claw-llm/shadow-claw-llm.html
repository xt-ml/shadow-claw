<template><div class="settings-section" data-setting="llm-provider-settings"> <h3>🔑 LLM Provider</h3> <div class="form-group"> <label class="form-label">Select Provider</label> <select class="form-select" data-setting="provider-select"></select> </div> <div class="form-group" data-setting="api-key-group"> <label class="form-label">API Key</label> <div class="password-input-wrapper"> <input class="form-input" data-setting="api-key-input" placeholder="Enter API Key" type="password"> <button aria-label="Toggle Password Visibility" class="password-toggle-btn" data-action="toggle-api-key-visibility" type="button"> 👁️ </button> </div> </div> <button class="save-btn" data-action="save-llm-provider"> 💾 Save Provider </button> </div><div class="settings-section" data-setting="model-settings"> <h3>🤖 Model</h3> <div class="form-group"> <label class="form-label">Select Model</label> <select class="form-select" data-setting="model-select" style="margin-bottom:.5rem"></select> <input class="form-input" data-setting="custom-model-input" placeholder="Type your custom model ID (e.g. org/model-name)" style="display:none" type="text"> <div class="form-helper"> Select a model from the list, or choose "Custom Model" to provide your own ID. </div> <div class="form-helper" data-setting="model-provider-helper" style="color:var(--shadow-claw-text-secondary);font-style:italic;margin-top:.25rem"></div> </div> <button class="save-btn" data-action="refresh-models"> ↻ Refresh Models </button> <button class="save-btn" data-action="save-model">💾 Save Model</button> </div><div class="settings-section" data-setting="llamafile-settings" style="display:none"> <h3>🦙 Llamafile Runtime</h3> <div class="form-group"> <label class="form-label">Runtime Mode</label> <select class="form-select" data-setting="llamafile-mode-select"> <option value="cli">CLI (Managed)</option> <option value="server">Server (External)</option> </select> <div class="form-helper"> CLI mode starts llamafile automatically when needed. Server mode connects to an existing llamafile server. </div> </div> <div data-setting="llamafile-server-only" style="display:none"> <div class="form-group"> <label class="form-label">Server Host</label> <input class="form-input" data-setting="llamafile-host-input" placeholder="127.0.0.1" type="text"> </div> <div class="form-group"> <label class="form-label">Server Port</label> <input class="form-input" data-setting="llamafile-port-input" placeholder="8080" type="number"> </div> </div> <div data-setting="llamafile-cli-only"> <div class="form-group"> <div class="form-toggle"> <input data-setting="llamafile-offline-toggle" id="llamafile-offline-toggle" type="checkbox"> <label class="form-label" for="llamafile-offline-toggle"> Offline Mode </label> </div> <div class="form-helper"> When enabled, llamafile will not attempt to download models from the internet. </div> </div> </div> <button class="save-btn" data-action="save-llamafile-settings"> 💾 Save Llamafile Settings </button> </div><div class="settings-section" data-setting="bedrock-settings" style="display:none"> <h3>☁️ AWS Bedrock Fallback</h3> <div class="form-group"> <label class="form-label">Region</label> <input class="form-input" data-setting="bedrock-region-input" placeholder="us-east-1" type="text"> </div> <div class="form-group"> <label class="form-label">Profile</label> <input class="form-input" data-setting="bedrock-profile-input" placeholder="default" type="text"> </div> <div class="form-group"> <label class="form-label">Authentication Mode</label> <select class="form-select" data-setting="bedrock-auth-mode-select"> <option value="provider_chain">Default Provider Chain</option> <option value="profile">Named Profile</option> </select> </div> <div class="form-helper"> These settings are used when Bedrock is configured as a fallback model directly. </div> <button class="save-btn" data-action="save-bedrock-settings"> 💾 Save Bedrock Settings </button> </div><div class="settings-section" data-setting="transformers-js-settings" style="display:none"> <h3>✨ Transformers.js Browser</h3> <div class="form-group"> <label class="form-label">Preferred Device</label> <select class="form-select" data-setting="transformers-js-device-select"> <option value="auto">Auto-detect</option> <option value="webgpu">WebGPU (Fastest)</option> <option value="wasm">WASM (Compatibility)</option> </select> <div class="form-helper"> Select the hardware backend for local model execution. WebGPU is recommended for modern browsers and dedicated GPUs. </div> </div> <div class="form-group"> <label class="form-label">Preferred Dtype</label> <select class="form-select" data-setting="transformers-js-dtype-select"> <option value="auto">Auto (Balanced)</option> <option value="fp32">Float32 (High Precision)</option> <option value="fp16">Float16 (Performance)</option> <option value="q8">Quantized 8-bit (Memory Efficient)</option> <option value="q4">Quantized 4-bit (Ultra Small)</option> </select> <div class="form-helper"> Controls dtype preference order for browser inference. Models are not re-quantized; this selects the closest available model revision. </div> </div> <button class="save-btn" data-action="save-transformers-js-settings"> 💾 Save Browser Inference Settings </button> </div><div class="settings-section"> <h3>📏 Max Output Tokens</h3> <div class="form-group"> <label class="form-label">Max Tokens</label> <input class="form-input" data-setting="max-tokens-input" placeholder="4096" type="number"> <div class="form-helper"> Caps the assistant response length for the current model. </div> </div> <button class="save-btn" data-action="save-max-tokens"> 💾 Save Max Tokens </button> </div><div class="settings-section"> <h3>⚡ Streaming Responses</h3> <div class="form-group"> <div class="form-toggle"> <input data-setting="streaming-toggle" id="streaming-toggle" type="checkbox"> <label class="form-label" for="streaming-toggle"> Enable Streaming </label> </div> <div class="form-helper"> When enabled, responses appear token-by-token. Supports OpenAI, Anthropic, and local providers. </div> </div> </div><div class="settings-section"> <h3>🗜️ Context Compression</h3> <div class="form-group"> <div class="form-toggle"> <input data-setting="context-compression-toggle" id="context-compression-toggle" type="checkbox"> <label class="form-label" for="context-compression-toggle"> Enable Context Compression </label> </div> <div class="form-helper"> Reduces token usage by summarizing history or stripping older latest messages. For OpenRouter models, this also activates their native context windowing. </div> </div> </div><div class="settings-section"> <h3>🔄 Max Iterations</h3> <div class="form-group"> <label class="form-label">Limit</label> <input class="form-input" data-setting="max-iterations-input" placeholder="50" type="number"> <div class="form-helper"> Caps the number of tool calls the agent can make in a single turn. </div> </div> <button class="save-btn" data-action="save-max-iterations"> 💾 Save Max Iterations </button> </div><div class="settings-section"> <h3>🚦 Request Rate Limit</h3> <div class="form-group"> <label class="form-label">Calls per Minute</label> <input class="form-input" data-setting="rate-limit-calls-per-minute-input" placeholder="0" type="number"> <div class="form-helper"> Set to 0 to disable. Manual override for model request rate limits. </div> </div> <div class="form-group"> <div class="form-toggle"> <input data-setting="rate-limit-auto-adapt-toggle" id="rate-limit-auto-adapt-toggle" type="checkbox"> <label class="form-label" for="rate-limit-auto-adapt-toggle"> Auto-adapt (Recommended) </label> </div> <div class="form-helper"> Applies a local sliding-window limit across model requests, including tool loop turns. </div> </div> <button class="save-btn" data-action="save-rate-limit-settings"> 💾 Save Rate Limit Settings </button> </div></template>
