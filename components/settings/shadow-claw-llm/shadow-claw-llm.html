<template><div class="settings-section"> <h3>👤 Assistant Name</h3> <div class="form-group"> <label class="form-label">Name</label> <input class="form-input" data-setting="assistant-name-input" placeholder="k9" type="text" value="k9"> <div class="form-helper"> Used to mention the assistant in chat (@name) </div> </div> <button class="save-btn" data-action="save-assistant-name"> 💾 Save Name </button> </div><div class="settings-section"> <h3>🔑 LLM Provider</h3> <div class="form-group"> <label class="form-label">Provider</label> <select class="form-select" data-setting="provider-select"></select> </div> <div class="form-group"> <label class="form-label">API Key</label> <input class="form-input" data-setting="api-key-input" type="password"> <div class="form-helper" data-setting="api-key-helper"> Your API key is encrypted and stored locally. It never leaves your browser. </div> </div> <button class="save-btn" data-action="save-api-key"> 💾 Save API Key & Provider </button> </div><div class="settings-section" data-setting="model-settings"> <h3>🤖 Model</h3> <div class="form-group"> <label class="form-label">Select Model</label> <select class="form-select" data-setting="model-select" style="margin-bottom:.5rem"></select> <input class="form-input" data-setting="custom-model-input" placeholder="Type your custom model ID (e.g. org/model-name)" style="display:none" type="text"> <div class="form-helper"> Select a model from the list, or choose "Custom Model" to provide your own ID. </div> <div class="form-helper" data-setting="model-provider-helper" hidden></div> </div> <button class="save-btn" data-action="refresh-models"> ↻ Refresh Models </button> <button class="save-btn" data-action="save-model">💾 Save Model</button> </div><div class="settings-section" data-setting="llamafile-settings" style="display:none"> <h3>🦙 Llamafile Runtime</h3> <div class="form-group"> <label class="form-label" for="llamafile-mode">Mode</label> <select class="form-select" data-setting="llamafile-mode" g="max-tokens-helper"> Caps the assistant response length for the current model. </div> </div> <button class="save-btn" data-action="apply-recommended-max-tokens"> Use Recommended Value </button> <button class="save-btn" data-action="save-max-tokens"> 💾 Save Max Tokens </button> </div><div class="settings-section"> <h3>⚡ Streaming Responses</h3> <div class="form-group"> <div class="form-toggle"> <input data-setting="streaming-toggle" id="streaming-toggle" type="checkbox"> <label class="form-label" for="streaming-toggle"> Enable streaming (show tokens as they arrive) </label> </div> <div class="form-helper"> When enabled, assistant responses appear token-by-token instead of waiting for the complete response. Disable for easier debugging of tool-use loops. </div> </div> </div><div class="settings-section"> <h3>🗜️ Context Compression</h3> <div class="form-group"> <div class="form-toggle"> <input data-setting="context-compression-toggle" id="context-compression-toggle" type="checkbox"> <label class="form-label" for="context-compression-toggle"> Enable context compression (skimming) </label> </div> <div class="form-helper"> When enabled, long conversations that hit the token limit are smartly "skimmed" to preserve the first few messages (initial context) and the latest messages. For OpenRouter models, this also activates their native compression plugin. </div> </div> </div><div class="settings-section"> <h3>🔄 Max Iterations</h3> <div class="form-group"> <label class="form-label">Tool-use iterations per invocation</label> <input class="form-input" data-setting="max-iterations-input" max="200" min="1" type="number" value="50"> <div class="form-helper"> Maximum number of tool-use loop iterations before stopping (default: ${DEFAULT_MAX_ITERATIONS}) </div> </div> <button class="save-btn" data-action="save-max-iterations"> 💾 Save Max Iterations </button> </div><div class="settings-section"> <h3>🚦 Request Rate Limit</h3> <div class="form-group"> <label class="form-label">Max provider calls per minute (0 disables)</label> <input class="form-input" data-setting="rate-limit-calls-per-minute-input" min="0" type="number" value="0"> <div class="form-helper"> Applies a local sliding-window limit across model requests, including retries and compaction calls. </div> </div> <div class="form-group"> <div class="form-toggle"> <input data-setting="rate-limit-auto-adapt-toggle" id="rate-limit-auto-adapt-toggle" type="checkbox"> <label class="form-label" for="rate-limit-auto-adapt-toggle"> Auto-adapt when provider sends rate-limit headers </label> </div> <div class="form-helper"> Uses headers like X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset, and Retry-After when available. </div> </div> <button class="save-btn" data-action="save-rate-limit-settings"> 💾 Save Rate Limit Settings </button> </div></template>
