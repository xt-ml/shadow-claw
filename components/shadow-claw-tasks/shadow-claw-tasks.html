<template><section aria-label="Tasks" class="tasks"> <shadow-claw-page-header icon="✓" title="Tasks"> <shadow-claw-page-header-action-button class="tasks__add-btn" slot="actions" title="Add a new scheduled task" variant="primary"> + Add Task </shadow-claw-page-header-action-button> <shadow-claw-page-header-action-button class="tasks__backup-btn" slot="actions" title="Backup tasks to file"> 💾 Backup </shadow-claw-page-header-action-button> <shadow-claw-page-header-action-button class="tasks__restore-btn" slot="actions" title="Restore tasks from backup"> ♻️ Restore </shadow-claw-page-header-action-button> <shadow-claw-page-header-action-button class="tasks__clear-btn" slot="actions" title="Delete all tasks" variant="danger"> 🗑️ Clear All </shadow-claw-page-header-action-button> </shadow-claw-page-header> <input accept=".json,application/json" aria-label="Restore tasks from JSON backup" class="tasks__hidden-restore" type="file"> <div class="tasks__content"> <div class="tasks__terminal-slot" data-terminal-slot hidden></div> <div aria-live="polite" class="tasks__list" role="list"></div> </div> <shadow-claw-dialog aria-labelledby="tasksDialogTitle" dialog-class="tasks__dialog"> <div class="tasks__dialog-header"> <h3 class="tasks__dialog-title" id="tasksDialogTitle">Add Task</h3> <button aria-label="Close task dialog" class="tasks__dialog-close" type="button"> ✕ </button> </div> <form class="tasks__dialog-form"> <div class="tasks__dialog-body"> <div class="tasks__form-group"> <label class="tasks__form-label" for="tasksScheduleInput"> Schedule (Cron Expression) </label> <input aria-describedby="tasksScheduleHint" class="tasks__form-input" id="tasksScheduleInput" name="schedule" placeholder="e.g., 0 9 * * * (daily at 9 AM)" type="text"> <div class="tasks__form-hint" id="tasksScheduleHint"> Standard cron format. Leave empty for an unscheduled task. </div> </div> <div class="tasks__form-group"> <label class="tasks__form-label">Task Type</label> <div class="tasks__type-options"> <label> <input type="radio" name="taskType" value="prompt" checked> Prompt </label> <label> <input type="radio" name="taskType" value="tools"> WebMCP Tools </label> </div> </div> <div class="tasks__form-group tasks__prompt-group"> <label class="tasks__form-label" id="taskLabel" for="tasksPromptInput"> Task Prompt </label> <textarea class="tasks__form-textarea" id="tasksPromptInput" name="prompt" placeholder="Enter the task prompt..."></textarea> </div> <div class="tasks__form-group tasks__tools-group" style="display:none"> <label class="tasks__form-label">WebMCP Tools List</label> <div class="tasks__tools-list"></div> <button type="button" class="tasks__add-tool-btn"> + Add Tool </button> </div> <div class="tasks__form-group tasks__preview-container"> <label class="tasks__form-label">Preview</label> <div class="tasks__preview tasks__prompt" id="tasksPreview"></div> </div> </div> <div class="tasks__dialog-footer"> <button class="tasks__btn-cancel" type="button">Cancel</button> <button class="tasks__btn-save tasks__dialog-submit" type="submit"> Add Task </button> </div> </form> </shadow-claw-dialog> </section></template>
