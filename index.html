<!doctype html>

    <meta

      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"

    <meta name="description" content="ShadowClaw - Browser-native AI agent." />

    <link href="assets/icons/favicon.ico" rel="icon" type="image/x-icon" />
    <link href="assets/icons/180.png" rel="apple-touch-icon" />
    <script>
      (function () {
        const themeKey = "shadow-claw-theme";
        const storedTheme = localStorage.getItem(themeKey) || "system";
        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolvedTheme =
          storedTheme === "system"
            ? prefersDark
              ? "dark"
              : "light"
            : storedTheme;

        document.documentElement.classList.add(`${resolvedTheme}-mode`);
      })();
    </script>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
