<!doctype html>
<html lang="en">
  <head>
    <title>ShadowClaw</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="description" content="ShadowClaw - Browser-native AI agent." />
    <meta name="theme-color" content="#fff" />
    <base href="/" />
    <link rel="manifest" href="manifest.json" />
    <link href="assets/icons/favicon.ico" rel="icon" type="image/x-icon" />
    <link href="assets/icons/icon-180.png" rel="apple-touch-icon" />
    <script type="importmap">
      {
        "imports": {
          "dompurify": "https://cdn.jsdelivr.net/npm/dompurify@3.3.1/+esm",
          "highlight.js": "https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/es/index.js/+esm",
          "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm",
          "marked": "https://cdn.jsdelivr.net/npm/marked@17.0.3/+esm",
          "signal-polyfill": "https://cdn.jsdelivr.net/npm/signal-polyfill@0.2.2/+esm",
          "v86": "https://cdn.jsdelivr.net/npm/v86/+esm",
          "workbox-window": "https://cdn.jsdelivr.net/npm/workbox-window@7.4.0/+esm",
          "zip": "https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.8.21/+esm"
        }
      }
    </script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        --shadow-claw-bg-primary: #ffffff;
        --shadow-claw-font-sans:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        --shadow-claw-text-primary: #111827;

        -moz-osx-font-smoothing: grayscale;
        -webkit-font-smoothing: antialiased;
        background-color: var(--shadow-claw-bg-primary);
        color: var(--shadow-claw-text-primary);
        display: flex;
        flex-direction: column;
        font-family: var(--shadow-claw-font-sans);
        height: 100%;
        height: 100vh;
        height: 100dvh;
        width: 100%;
      }
    </style>

    <script src="service-worker/init.mjs" type="module"></script>
  </head>

  <body>
    <shadow-claw></shadow-claw>

    <script type="module" src="./index.mjs"></script>
  </body>
</html>
