<template>
  <section class="files" aria-label="Files">
    <shadow-claw-page-header icon="&#128193;" title="Files">
      <button
        slot="actions"
        type="button"
        title="Refresh file list"
        class="files__refresh-btn files__header-btn"
      >
        &#128260; Refresh
      </button>
      <button
        slot="actions"
        type="button"
        title="Upload files to workspace"
        class="files__upload-btn files__header-btn"
      >
        &#128228; Upload
      </button>
      <button
        slot="actions"
        type="button"
        title="Create a new file"
        class="files__new-btn files__header-btn"
      >
        &#10133; New
      </button>
      <button
        slot="actions"
        type="button"
        title="Backup workspace files"
        class="files__backup-btn files__header-btn"
      >
        &#128190; Backup
      </button>
      <button
        slot="actions"
        type="button"
        title="Restore workspace from backup"
        class="files__restore-btn files__header-btn"
      >
        &#9851;&#65039; Restore
      </button>
      <button
        slot="actions"
        type="button"
        title="Delete all workspace files"
        class="files__clear-btn files__header-btn files__header-btn--danger"
      >
        &#128465;&#65039; Clear All
      </button>
      <nav
        slot="breadcrumbs"
        class="files__breadcrumbs"
        aria-label="Current folder"
      >
        <span class="files__breadcrumbs-path" data-breadcrumb-path></span>
        <span
          class="files__breadcrumbs-spacer"
          aria-hidden="true"
          hidden
        ></span>
        <button
          type="button"
          class="files__sync-btn files__sync-host-btn"
          title="Push host Files panel changes into /home/user inside WebVM"
          hidden
        >
          Host &rarr; VM
        </button>
        <button
          type="button"
          class="files__sync-btn files__sync-vm-btn"
          title="Pull /home/user changes from WebVM terminal back into Files panel"
          hidden
        >
          VM &rarr; Host
        </button>
      </nav>
    </shadow-claw-page-header>
    <input
      type="file"
      class="files__hidden-upload files__hidden-input"
      multiple
      accept="*/*"
      aria-label="Upload files"
    />
    <input
      type="file"
      class="files__hidden-restore files__hidden-input"
      accept=".zip,application/zip"
      aria-label="Restore files from zip backup"
    />
    <shadow-claw-dialog
      dialog-class="files__new-dialog"
      aria-label="Create new file"
    >
      <form class="files__new-form" method="dialog">
        <label class="files__new-label" for="files-new-name">File name</label>
        <input
          class="files__new-input"
          id="files-new-name"
          name="files-new-name"
          type="text"
          autocomplete="off"
          required
        />
        <div class="files__new-actions">
          <button class="files__new-cancel" type="button">Cancel</button>
          <button class="files__new-ok" type="submit">OK</button>
        </div>
      </form>
    </shadow-claw-dialog>
    <shadow-claw-dialog
      dialog-class="files__rename-dialog"
      aria-label="Rename file or folder"
    >
      <form class="files__rename-form" method="dialog">
        <label class="files__rename-label" for="files-rename-name">Name</label>
        <input
          class="files__rename-input"
          id="files-rename-name"
          name="files-rename-name"
          type="text"
          autocomplete="off"
          required
        />
        <div class="files__rename-actions">
          <button class="files__rename-cancel" type="button">Cancel</button>
          <button class="files__rename-ok" type="submit">Rename</button>
        </div>
      </form>
    </shadow-claw-dialog>
    <div class="files__content">
      <div class="files__terminal-slot" data-terminal-slot hidden></div>
      <p class="files__drop-hint">Drop files here to upload</p>
      <div
        class="files__upload-progress"
        aria-live="polite"
        aria-label="Upload progress"
      >
        <span class="files__upload-progress-label">Uploading files...</span>
        <div class="files__upload-progress-track">
          <div class="files__upload-progress-bar"></div>
        </div>
      </div>
      <div class="files__list" role="list" aria-live="polite"></div>
    </div>
  </section>
</template>
